<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>صفحة الكابتن - أدبل</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0B1220; --surface:#111A2E; --surface-2:#172238; --line:#22304D;
  --text:#E7ECF7; --muted:#8B98B5; --primary:#FFD400; --accent:#22D3EE;
  --success:#22C55E; --danger:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Tajawal',sans-serif}
body{background:var(--bg);color:var(--text);min-height:100vh}
.app{max-width:520px;margin:0 auto;min-height:100vh}
.header{padding:22px 18px 16px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--line);background:linear-gradient(135deg,#1A2540 0%,#0F1A30 100%)}
.header .logo{width:46px;height:46px;border-radius:14px;background:#1E40AF;color:#fff;display:grid;place-items:center;font-size:22px;box-shadow:0 8px 20px rgba(30,64,175,.4)}
.header h2{font-size:18px;font-weight:900}
.header p{font-size:12px;color:var(--muted)}
.section{padding:14px 18px}
.card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px}
.label{font-size:13px;color:var(--muted);margin-bottom:6px;display:block;font-weight:500}
.input{width:100%;background:var(--surface-2);border:1px solid var(--line);border-radius:12px;padding:12px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
.input:focus{border-color:var(--primary)}
.btn{width:100%;padding:14px;border:none;border-radius:14px;font-size:15px;font-weight:800;font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
.btn:active{transform:scale(.98)}
.btn-primary{background:var(--primary);color:#0B1220}
.btn-ghost{background:var(--surface-2);color:var(--text);border:1px solid var(--line)}
.btn-success{background:var(--success);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-blue{background:#1E40AF;color:#fff}
.tabs{display:flex;background:var(--surface-2);border-radius:12px;padding:4px;margin-bottom:14px}
.tab{flex:1;text-align:center;padding:10px;border-radius:10px;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
.tab.active{background:var(--primary);color:#0B1220}
.online-toggle{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;background:var(--surface);border:1px solid var(--line);border-radius:16px;margin-bottom:14px}
.toggle{position:relative;width:56px;height:30px;background:var(--surface-2);border-radius:999px;cursor:pointer;border:1px solid var(--line)}
.toggle::after{content:'';position:absolute;top:2px;right:2px;width:24px;height:24px;background:var(--muted);border-radius:50%;transition:all .25s}
.toggle.on{background:var(--success);border-color:var(--success)}
.toggle.on::after{right:calc(100% - 26px);background:#fff}
.row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px dashed var(--line)}
.row:last-child{border-bottom:none}
.muted{color:var(--muted);font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(120%);background:#0B1220;color:#fff;padding:12px 18px;border-radius:12px;border:1px solid var(--line);font-size:14px;z-index:9999;transition:all .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.err{border-color:var(--danger)}
.toast.ok{border-color:var(--success)}
.hidden{display:none!important}
.empty{text-align:center;padding:36px 20px;color:var(--muted)}
.empty i{font-size:46px;margin-bottom:10px;opacity:.4}
.ride-card{background:var(--surface);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:12px}
.ride-card h4{font-size:15px;font-weight:800;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.ride-card .price-big{font-size:24px;font-weight:900;color:var(--primary);margin:8px 0}
.ride-card .meta{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.ride-card .meta div{background:var(--surface-2);padding:10px;border-radius:10px;font-size:12px}
.ride-card .meta strong{display:block;margin-bottom:2px;color:var(--text);font-size:13px}
.ride-card .meta span{color:var(--muted)}
.actions-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.field{margin-bottom:12px}
.auth-wrap{padding:30px 20px;max-width:420px;margin:0 auto}
.status-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;background:var(--surface-2);border-radius:12px;margin-bottom:14px;font-weight:700;font-size:14px}
.dot{width:10px;height:10px;border-radius:50%;background:var(--success);animation:blink 1s infinite}
@keyframes blink{50%{opacity:.3}}
#capMap{height:200px;border-radius:14px;overflow:hidden;margin-bottom:12px}
.tabs-main{display:flex;gap:8px;margin-bottom:14px}
.tab-main{flex:1;padding:12px;background:var(--surface);border:1px solid var(--line);border-radius:12px;text-align:center;font-size:13px;font-weight:700;cursor:pointer;color:var(--muted)}
.tab-main.active{background:var(--primary);color:#0B1220;border-color:var(--primary)}
.badge-count{display:inline-block;min-width:20px;padding:2px 6px;background:var(--danger);color:#fff;border-radius:999px;font-size:11px;margin-right:4px}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="logo"><i class="fas fa-id-badge"></i></div>
    <div><h2>صفحة الكابتن</h2><p>استقبل طلبات الركاب القريبين منك</p></div>
  </div>

  <!-- AUTH -->
  <div id="authView" class="auth-wrap">
    <div class="card">
      <div class="tabs">
        <div class="tab active" data-t="login">دخول</div>
        <div class="tab" data-t="reg">تسجيل ككابتن</div>
      </div>
      <div id="loginBox">
        <div class="field"><label class="label">البريد</label><input id="lEmail" class="input" type="email"></div>
        <div class="field"><label class="label">كلمة المرور</label><input id="lPass" class="input" type="password"></div>
        <button class="btn btn-primary" id="loginBtn"><i class="fas fa-right-to-bracket"></i> دخول</button>
      </div>
      <div id="regBox" class="hidden">
        <div class="field"><label class="label">الاسم الكامل</label><input id="rName" class="input"></div>
        <div class="field"><label class="label">رقم الجوال</label><input id="rPhone" class="input" placeholder="09xxxxxxxx"></div>
        <div class="field"><label class="label">نوع السيارة</label><input id="rCar" class="input" placeholder="مثال: كيا سيراتو 2020"></div>
        <div class="field"><label class="label">رقم اللوحة</label><input id="rPlate" class="input"></div>
        <div class="field"><label class="label">البريد</label><input id="rEmail" class="input" type="email"></div>
        <div class="field"><label class="label">كلمة المرور</label><input id="rPass" class="input" type="password" placeholder="6 أحرف على الأقل"></div>
        <button class="btn btn-primary" id="regBtn"><i class="fas fa-user-plus"></i> تسجيل الحساب</button>
      </div>
    </div>
  </div>

  <!-- DASHBOARD -->
  <div id="dashView" class="hidden">
    <div class="section">
      <div class="online-toggle">
        <div>
          <strong id="capNameLabel">-</strong>
          <div class="muted" id="onlineStatus">غير متصل</div>
        </div>
        <div class="toggle" id="onlineToggle"></div>
      </div>

      <div class="tabs-main">
        <div class="tab-main active" data-tm="incoming">الطلبات الواردة <span class="badge-count hidden" id="incCount">0</span></div>
        <div class="tab-main" data-tm="active">رحلتي الحالية</div>
      </div>

      <!-- INCOMING -->
      <div id="incomingTab">
        <div id="incomingList"></div>
      </div>

      <!-- ACTIVE -->
      <div id="activeTab" class="hidden">
        <div id="activeRideBox">
          <div class="empty"><i class="fas fa-route"></i><h4>لا توجد رحلة نشطة</h4><p>قبول طلب من الواردة</p></div>
        </div>
      </div>

      <button class="btn btn-ghost" id="logoutBtn" style="margin-top:14px"><i class="fas fa-right-from-bracket"></i> خروج</button>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, onSnapshot, collection, query, where, runTransaction, serverTimestamp, GeoPoint } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3wjOh1IZLS5cK8dH0fB6nwKH50iXvFhk",
  authDomain: "ahmad-b755f.firebaseapp.com",
  projectId: "ahmad-b755f",
  storageBucket: "ahmad-b755f.firebasestorage.app",
  messagingSenderId: "1086597289816",
  appId: "1:1086597289816:web:efe60451f04837b75e772d"
};
const fbApp = initializeApp(firebaseConfig);
const auth = getAuth(fbApp);
const db = getFirestore(fbApp);
setPersistence(auth, browserLocalPersistence).catch(()=>{});

const SEARCH_RADIUS_KM = 30;
const $ = s => document.querySelector(s);
const toast = (m,t='') => { const el=$('#toast'); el.textContent=m; el.className='toast show '+t; setTimeout(()=>el.classList.remove('show'),2500); };
const km = (a,b)=>{ if(!a||!b) return null; const R=6371,toR=x=>x*Math.PI/180; const dLat=toR(b.lat-a.lat),dLng=toR(b.lng-a.lng); const x=Math.sin(dLat/2)**2+Math.cos(toR(a.lat))*Math.cos(toR(b.lat))*Math.sin(dLng/2)**2; return 2*R*Math.asin(Math.sqrt(x)); };

let user=null, captain=null, online=false, locWatch=null, currentLoc=null;
let incomingUnsub=null, activeUnsub=null, activeRide=null, activeRideId=null;
let pendingRides=[];

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  $('#loginBox').classList.toggle('hidden', t.dataset.t!=='login');
  $('#regBox').classList.toggle('hidden', t.dataset.t!=='reg');
}));
document.querySelectorAll('.tab-main').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab-main').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  $('#incomingTab').classList.toggle('hidden', t.dataset.tm!=='incoming');
  $('#activeTab').classList.toggle('hidden', t.dataset.tm!=='active');
}));

$('#loginBtn').onclick = async ()=>{
  try{ await signInWithEmailAndPassword(auth, $('#lEmail').value.trim(), $('#lPass').value); }
  catch(e){ toast('فشل الدخول','err'); }
};
$('#regBtn').onclick = async ()=>{
  const name=$('#rName').value.trim(), phone=$('#rPhone').value.trim(), car=$('#rCar').value.trim(),
        plate=$('#rPlate').value.trim(), email=$('#rEmail').value.trim(), pass=$('#rPass').value;
  if(!name||!phone||!car||!email||pass.length<6){ toast('املأ الحقول','err'); return; }
  try{
    const cred = await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'captains',cred.user.uid),{
      name, phone, car, plate, email, online:false, location:null, createdAt: serverTimestamp()
    });
  }catch(e){ toast('فشل التسجيل: '+e.code,'err'); }
};

onAuthStateChanged(auth, async u=>{
  if(!u){ $('#authView').classList.remove('hidden'); $('#dashView').classList.add('hidden'); stopWatching(); return; }
  user=u;
  // get or create captain doc
  let snap = await getDoc(doc(db,'captains',u.uid));
  if(!snap.exists()){
    // user logged in but isn't a captain -> create base record from email
    await setDoc(doc(db,'captains',u.uid),{ name:u.email, phone:'', email:u.email, online:false, location:null, createdAt:serverTimestamp() });
    snap = await getDoc(doc(db,'captains',u.uid));
  }
  captain = snap.data();
  $('#capNameLabel').textContent = captain.name||u.email;
  $('#authView').classList.add('hidden');
  $('#dashView').classList.remove('hidden');
  online = !!captain.online;
  applyToggleUi();
  if(online) startWatching();
  listenIncoming();
  listenActive();
});

$('#logoutBtn').onclick = async ()=>{
  await goOffline(); await signOut(auth);
};

$('#onlineToggle').onclick = async ()=>{
  if(online){ await goOffline(); }
  else { await goOnline(); }
};

function applyToggleUi(){
  $('#onlineToggle').classList.toggle('on', online);
  $('#onlineStatus').textContent = online ? 'متصل ومتاح للطلبات' : 'غير متصل';
  $('#onlineStatus').style.color = online ? 'var(--success)' : 'var(--muted)';
}

async function goOnline(){
  if(!navigator.geolocation){ toast('GPS غير مدعوم','err'); return; }
  try{
    const pos = await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{enableHighAccuracy:true,timeout:10000}));
    currentLoc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    await updateDoc(doc(db,'captains',user.uid),{ online:true, location: currentLoc, lastSeen: serverTimestamp() });
    online = true; applyToggleUi(); startWatching();
    toast('أنت متصل الآن','ok');
  }catch(e){ toast('تعذر تحديد موقعك','err'); }
}
async function goOffline(){
  await updateDoc(doc(db,'captains',user.uid),{ online:false, lastSeen: serverTimestamp() });
  online = false; applyToggleUi(); stopWatching();
}
function startWatching(){
  if(locWatch) return;
  locWatch = navigator.geolocation.watchPosition(async pos=>{
    currentLoc = {lat:pos.coords.latitude, lng:pos.coords.longitude};
    try{ await updateDoc(doc(db,'captains',user.uid),{ location: currentLoc, lastSeen: serverTimestamp() }); }catch(_){}
    if(activeRideId){
      try{ await updateDoc(doc(db,'rides',activeRideId),{ captainLocation: currentLoc }); }catch(_){}
    }
  },()=>{}, {enableHighAccuracy:true, maximumAge:5000, timeout:15000});
}
function stopWatching(){ if(locWatch){ navigator.geolocation.clearWatch(locWatch); locWatch=null; } }

function listenIncoming(){
  if(incomingUnsub) incomingUnsub();
  incomingUnsub = onSnapshot(query(collection(db,'rides'), where('status','==','searching')), snap=>{
    pendingRides = snap.docs.map(d=>({id:d.id,...d.data()}));
    renderIncoming();
  });
}

function renderIncoming(){
  const wrap = $('#incomingList');
  if(!online){ wrap.innerHTML = `<div class="empty"><i class="fas fa-toggle-off"></i><h4>أنت غير متصل</h4><p>فعّل الاتصال لاستقبال الطلبات</p></div>`; $('#incCount').classList.add('hidden'); return; }
  // compute distances and filter
  const rides = pendingRides
    .map(r=>{ const d = currentLoc ? km(currentLoc, r.pickup) : null; return {...r,_capKm:d}; })
    .filter(r=>r._capKm===null || r._capKm<=SEARCH_RADIUS_KM)
    .sort((a,b)=>(a._capKm||999)-(b._capKm||999));
  if(!rides.length){ wrap.innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><h4>لا توجد طلبات حالياً</h4><p>سيظهر الطلب هنا فور وصوله</p></div>`; $('#incCount').classList.add('hidden'); return; }
  $('#incCount').classList.remove('hidden'); $('#incCount').textContent = rides.length;
  wrap.innerHTML = rides.map(r=>{
    const capKm = r._capKm!==null ? r._capKm.toFixed(2)+' كم' : '—';
    return `<div class="ride-card" data-id="${r.id}">
      <h4><i class="fas fa-user"></i> ${r.customerName||'عميل'}</h4>
      <div class="meta">
        <div><strong>المسافة إلى العميل</strong><span>${capKm}</span></div>
        <div><strong>مسافة الرحلة</strong><span>${(+r.routeKm||0).toFixed(2)} كم</span></div>
      </div>
      <div class="price-big">${(+r.price||0).toLocaleString()} ل.س</div>
      <div class="actions-grid">
        <button class="btn btn-success" data-act="accept" data-id="${r.id}"><i class="fas fa-check"></i> قبول</button>
        <button class="btn btn-ghost" data-act="reject" data-id="${r.id}"><i class="fas fa-xmark"></i> تجاهل</button>
      </div>
    </div>`;
  }).join('');
  wrap.querySelectorAll('button[data-act]').forEach(b=>b.onclick=()=>{
    if(b.dataset.act==='accept') acceptRide(b.dataset.id);
    else b.closest('.ride-card').style.display='none';
  });
}

async function acceptRide(rideId){
  if(!currentLoc){ toast('فعّل GPS أولاً','err'); return; }
  try{
    await runTransaction(db, async tx=>{
      const ref = doc(db,'rides',rideId);
      const snap = await tx.get(ref);
      if(!snap.exists()) throw new Error('الطلب غير موجود');
      const r = snap.data();
      if(r.status!=='searching' || r.captainId) throw new Error('تم استلام الطلب من كابتن آخر');
      tx.update(ref,{
        status:'accepted',
        captainId: user.uid,
        captainName: captain.name||'',
        captainPhone: captain.phone||'',
        captainCar: captain.car||'',
        captainPlate: captain.plate||'',
        captainLocation: currentLoc,
        captainPickupKm: km(currentLoc, r.pickup),
        acceptedAt: serverTimestamp()
      });
    });
    toast('تم قبول الطلب','ok');
    document.querySelector('.tab-main[data-tm="active"]').click();
  }catch(e){ toast(e.message||'فشل القبول','err'); }
}

function listenActive(){
  if(activeUnsub) activeUnsub();
  activeUnsub = onSnapshot(query(collection(db,'rides'), where('captainId','==',user.uid), where('status','in',['accepted','arrived','in_progress'])), snap=>{
    if(snap.empty){ activeRide=null; activeRideId=null; renderActive(); return; }
    activeRideId = snap.docs[0].id;
    activeRide = snap.docs[0].data();
    renderActive();
  });
}

function renderActive(){
  const wrap = $('#activeRideBox');
  if(!activeRide){
    wrap.innerHTML = `<div class="empty"><i class="fas fa-route"></i><h4>لا توجد رحلة نشطة</h4><p>قبول طلب من الواردة</p></div>`;
    return;
  }
  const r = activeRide;
  const statusMap = {accepted:'في الطريق إلى العميل', arrived:'وصلت لموقع العميل', in_progress:'الرحلة جارية'};
  // Show location pin (works reliably). For navigation use directions link.
  const pickupShow = `https://www.google.com/maps?q=${r.pickup.lat},${r.pickup.lng}`;
  const pickupNav  = `https://www.google.com/maps/dir/?api=1&destination=${r.pickup.lat},${r.pickup.lng}&travelmode=driving`;
  const destShow   = `https://www.google.com/maps?q=${r.destination.lat},${r.destination.lng}`;
  const destNav    = `https://www.google.com/maps/dir/?api=1&destination=${r.destination.lat},${r.destination.lng}&travelmode=driving`;
  let actions = '';
  if(r.status==='accepted') actions = `<button class="btn btn-success" id="markArrived"><i class="fas fa-flag-checkered"></i> وصلت لموقع العميل</button>`;
  if(r.status==='arrived') actions = `<button class="btn btn-primary" id="startRide"><i class="fas fa-play"></i> بدء الرحلة</button>`;
  if(r.status==='in_progress') actions = `<button class="btn btn-success" id="completeRide"><i class="fas fa-check-double"></i> إنهاء الرحلة</button>`;

  wrap.innerHTML = `
    <div class="status-bar"><span class="dot"></span>${statusMap[r.status]}</div>
    <div class="card">
      <h4><i class="fas fa-user"></i> ${r.customerName||'عميل'}</h4>
      <div class="row"><span>الهاتف</span><a href="tel:${r.customerPhone||''}" style="color:var(--accent);font-weight:700">${r.customerPhone||'-'}</a></div>
      <div class="row"><span>مسافة الرحلة</span><strong>${(+r.routeKm||0).toFixed(2)} كم</strong></div>
      <div class="row"><span>السعر</span><strong style="color:var(--primary);font-size:18px">${(+r.price||0).toLocaleString()} ل.س</strong></div>
      <div id="capMap" style="margin-top:12px"></div>
      <div class="muted" style="margin:10px 0 6px;font-size:12px">عرض الموقع على الخريطة:</div>
      <div class="actions-grid">
        <a href="${pickupShow}" target="_blank" rel="noopener" class="btn btn-blue"><i class="fas fa-location-dot"></i> موقع العميل</a>
        <a href="${destShow}" target="_blank" rel="noopener" class="btn btn-blue"><i class="fas fa-flag"></i> الوجهة</a>
      </div>
      <div class="muted" style="margin:10px 0 6px;font-size:12px">بدء الملاحة (Google Maps):</div>
      <div class="actions-grid">
        <a href="${pickupNav}" target="_blank" rel="noopener" class="btn btn-success"><i class="fas fa-route"></i> توجّه للعميل</a>
        <a href="${destNav}" target="_blank" rel="noopener" class="btn btn-success"><i class="fas fa-route"></i> توجّه للوجهة</a>
      </div>
      <div style="margin-top:10px">${actions}</div>
      <button class="btn btn-danger" id="cancelActive" style="margin-top:8px"><i class="fas fa-xmark"></i> إلغاء الرحلة</button>
    </div>
  `;
  // Mini map
  setTimeout(()=>{
    const m = L.map('capMap',{zoomControl:false}).setView([r.pickup.lat,r.pickup.lng],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OSM'}).addTo(m);
    const pIcon = c => L.divIcon({className:'',html:`<div style="background:${c};width:20px;height:20px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid #fff;box-shadow:0 2px 6px rgba(0,0,0,.5)"></div>`,iconAnchor:[10,20]});
    const pickupM = L.marker([r.pickup.lat,r.pickup.lng],{icon:pIcon('#22D3EE')}).addTo(m).bindPopup('العميل');
    const destM = L.marker([r.destination.lat,r.destination.lng],{icon:pIcon('#EF4444')}).addTo(m).bindPopup('الوجهة');
    if(currentLoc) L.marker([currentLoc.lat,currentLoc.lng],{icon:pIcon('#FFD400')}).addTo(m).bindPopup('أنا');
    const group = L.featureGroup([pickupM,destM]);
    if(currentLoc) group.addLayer(L.marker([currentLoc.lat,currentLoc.lng]));
    m.fitBounds(group.getBounds(),{padding:[30,30]});
  },150);

  if($('#markArrived')) $('#markArrived').onclick = ()=> updateDoc(doc(db,'rides',activeRideId),{ status:'arrived', arrivedAt: serverTimestamp() });
  if($('#startRide')) $('#startRide').onclick = ()=> updateDoc(doc(db,'rides',activeRideId),{ status:'in_progress', startedAt: serverTimestamp() });
  if($('#completeRide')) $('#completeRide').onclick = async ()=>{
    await updateDoc(doc(db,'rides',activeRideId),{ status:'completed', completedAt: serverTimestamp() });
    toast('اكتملت الرحلة - بانتظار طلب جديد','ok');
    document.querySelector('.tab-main[data-tm="incoming"]').click();
  };
  $('#cancelActive').onclick = async ()=>{
    if(!confirm('تأكيد إلغاء الرحلة؟')) return;
    await updateDoc(doc(db,'rides',activeRideId),{ status:'cancelled', cancelledAt: serverTimestamp() });
  };
}
</script>
