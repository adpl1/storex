<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>تسجيل الدخول | ادبل</title>
<meta name="description" content="سجّل دخولك إلى منصة ادبل لطلب التوصيل بسرعة وسهولة.">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<link rel="icon" type="image/png" href="favicon.png">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F5C842">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="ادبل">
<link rel="apple-touch-icon" href="favicon.png">
<style>
:root{
  --primary:#FF5A1F; --primary-dark:#E04A10; --primary-light:#FFE8DD;
  --dark:#1A1D29; --gray:#6B7280; --light:#F8F9FB; --border:#E8EBF0;
  --success:#22C55E; --danger:#EF4444; --yellow:#F5C842;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Cairo',sans-serif}
html,body{width:100%;min-height:100%}
body{background:linear-gradient(160deg,#1A1D29 0%,#2D3250 60%,#1A1D29 100%);color:var(--dark);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{width:100%;max-width:420px;background:white;border-radius:24px;padding:32px 26px;box-shadow:0 20px 60px rgba(0,0,0,.35);position:relative;overflow:hidden}
.card::before{content:"";position:absolute;top:-60px;left:-60px;width:160px;height:160px;background:radial-gradient(circle,var(--yellow),transparent 70%);opacity:.45}
.brand{display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:22px;position:relative}
.brand .logo{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--primary),#FF8A4C);display:flex;align-items:center;justify-content:center;color:white;font-size:30px;box-shadow:0 10px 24px rgba(255,90,31,.35)}
.brand h1{font-size:22px;font-weight:900}
.brand p{font-size:13px;color:var(--gray)}
.tabs{display:flex;background:var(--light);border-radius:14px;padding:5px;margin-bottom:18px;position:relative}
.tabs button{flex:1;padding:10px;border:none;background:transparent;font-family:inherit;font-weight:800;font-size:14px;color:var(--gray);cursor:pointer;border-radius:10px;transition:.2s}
.tabs button.active{background:white;color:var(--primary);box-shadow:0 4px 12px rgba(0,0,0,.06)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;font-weight:700;margin-bottom:6px}
.field .wrap{position:relative}
.field .wrap i.lead{position:absolute;top:50%;transform:translateY(-50%);right:14px;color:var(--gray);font-size:14px}
.field input{width:100%;padding:14px 42px 14px 14px;border:1.5px solid var(--border);border-radius:14px;font-size:15px;font-family:inherit;background:var(--light);transition:.2s;outline:none}
.field input:focus{border-color:var(--primary);background:white;box-shadow:0 0 0 4px rgba(255,90,31,.1)}
.toggle-pass{position:absolute;top:50%;transform:translateY(-50%);left:12px;background:none;border:none;color:var(--gray);cursor:pointer;font-size:14px;padding:6px}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:white;box-shadow:0 8px 20px rgba(255,90,31,.35)}
.btn-primary:disabled{opacity:.7;cursor:not-allowed}
.alert{display:none;padding:10px 12px;border-radius:10px;font-size:13px;margin-bottom:12px;font-weight:600}
.alert.error{background:#FEE2E2;color:#991B1B;display:block}
.alert.success{background:#DCFCE7;color:#166534;display:block}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:white;border-radius:50%;animation:spin .7s linear infinite;display:none}
.spinner.show{display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}
.back{position:absolute;top:14px;right:14px;width:36px;height:36px;border-radius:10px;background:var(--light);display:flex;align-items:center;justify-content:center;color:var(--dark);text-decoration:none;font-size:14px;border:1px solid var(--border);z-index:2}
.row{display:flex;justify-content:space-between;align-items:center;margin:6px 0 16px;font-size:12px}
.row a{color:var(--primary);text-decoration:none;font-weight:700;cursor:pointer}
.hide{display:none}
</style>
</head>
<body>
  <div class="card">
    <a href="index_3.html" class="back" title="رجوع"><i class="fas fa-arrow-right"></i></a>
    <div class="brand">
      <div class="logo" id="brandLogo"><i class="fas fa-motorcycle"></i></div>
      <h1 id="brandTitle">مرحباً بعودتك</h1>
      <p id="brandSub">سجّل دخولك للمتابعة إلى ادبل</p>
    </div>

    <div class="tabs">
      <button type="button" id="tabLogin" class="active">تسجيل الدخول</button>
      <button type="button" id="tabSignup">إنشاء حساب</button>
    </div>

    <div id="alertBox" class="alert"></div>

    <!-- Login -->
    <form id="loginForm" novalidate>
      <div class="field">
        <label for="email">البريد الإلكتروني</label>
        <div class="wrap">
          <i class="fas fa-envelope lead"></i>
          <input id="email" type="email" placeholder="example@mail.com" autocomplete="email" required />
        </div>
      </div>
      <div class="field">
        <label for="password">كلمة المرور</label>
        <div class="wrap">
          <i class="fas fa-lock lead"></i>
          <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required minlength="6" />
          <button type="button" class="toggle-pass" data-target="password" aria-label="إظهار"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <div class="row">
        <span></span>
        <a id="forgot">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">
        <span id="loginText">تسجيل الدخول</span>
        <span class="spinner" id="loginSpin"></span>
      </button>
    </form>

    <!-- Signup -->
    <form id="signupForm" class="hide" novalidate>
      <div class="field">
        <label for="sName">الاسم</label>
        <div class="wrap">
          <i class="fas fa-user lead"></i>
          <input id="sName" type="text" placeholder="اسمك الكامل" required />
        </div>
      </div>
      <div class="field">
        <label for="sEmail">البريد الإلكتروني</label>
        <div class="wrap">
          <i class="fas fa-envelope lead"></i>
          <input id="sEmail" type="email" placeholder="example@mail.com" autocomplete="email" required />
        </div>
      </div>
      <div class="field">
        <label for="sPassword">كلمة المرور</label>
        <div class="wrap">
          <i class="fas fa-lock lead"></i>
          <input id="sPassword" type="password" placeholder="6 أحرف على الأقل" autocomplete="new-password" required minlength="6" />
          <button type="button" class="toggle-pass" data-target="sPassword" aria-label="إظهار"><i class="fas fa-eye"></i></button>
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="signupBtn">
        <span id="signupText">إنشاء الحساب</span>
        <span class="spinner" id="signupSpin"></span>
      </button>
    </form>
  </div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, sendPasswordResetEmail, setPersistence, browserLocalPersistence, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3wjOh1IZLS5cK8dH0fB6nwKH50iXvFhk",
  authDomain: "ahmad-b755f.firebaseapp.com",
  projectId: "ahmad-b755f",
  storageBucket: "ahmad-b755f.firebasestorage.app",
  messagingSenderId: "1086597289816",
  appId: "1:1086597289816:web:efe60451f04837b75e772d",
  measurementId: "G-E41VP56DLZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});

const $ = s => document.querySelector(s);
const alertBox = $('#alertBox');
function showAlert(msg, type='error'){ alertBox.className='alert '+type; alertBox.textContent=msg; }
function clearAlert(){ alertBox.className='alert'; alertBox.textContent=''; }

function mapErr(e){
  const c = e.code||'';
  if(c.includes('email-already')) return 'البريد مسجل مسبقاً';
  if(c.includes('invalid-email')) return 'بريد غير صالح';
  if(c.includes('weak-password')) return 'كلمة المرور ضعيفة';
  if(c.includes('wrong-password')||c.includes('invalid-credential')||c.includes('user-not-found')) return 'بيانات الدخول غير صحيحة';
  if(c.includes('too-many')) return 'محاولات كثيرة، حاول لاحقاً';
  if(c.includes('network')) return 'فشل الاتصال بالشبكة';
  return e.message || 'حدث خطأ';
}

// Tabs
const tabLogin = $('#tabLogin'), tabSignup = $('#tabSignup');
const loginForm = $('#loginForm'), signupForm = $('#signupForm');
tabLogin.addEventListener('click', ()=>{
  tabLogin.classList.add('active'); tabSignup.classList.remove('active');
  loginForm.classList.remove('hide'); signupForm.classList.add('hide');
  $('#brandTitle').textContent = 'مرحباً بعودتك';
  $('#brandSub').textContent = 'سجّل دخولك للمتابعة إلى ادبل';
  clearAlert();
});
tabSignup.addEventListener('click', ()=>{
  tabSignup.classList.add('active'); tabLogin.classList.remove('active');
  signupForm.classList.remove('hide'); loginForm.classList.add('hide');
  $('#brandTitle').textContent = 'أهلاً بك في ادبل';
  $('#brandSub').textContent = 'أنشئ حسابك خلال ثوانٍ';
  clearAlert();
});

// Toggle password
document.querySelectorAll('.toggle-pass').forEach(b=>{
  b.addEventListener('click', ()=>{
    const t = document.getElementById(b.dataset.target);
    const isPass = t.type === 'password';
    t.type = isPass ? 'text' : 'password';
    b.innerHTML = isPass ? '<i class="fas fa-eye-slash"></i>' : '<i class="fas fa-eye"></i>';
  });
});

function setLoading(btn, textEl, spin, on, label){
  btn.disabled = on;
  spin.classList.toggle('show', on);
  if(on) textEl.textContent = 'جاري المعالجة...'; else textEl.textContent = label;
}

// Already signed in? → redirect
let redirected = false;
onAuthStateChanged(auth, async (user)=>{
  if(user && !redirected){
    try{
      const snap = await getDoc(doc(db,'users',user.uid));
      const role = snap.exists() ? (snap.data().role||'user') : 'user';
      if(role !== 'user'){
        await signOut(auth);
        showAlert('هذا الحساب ليس حساب مستخدم','error');
        return;
      }
      redirected = true;
      window.location.replace('index_3.html');
    }catch(e){
      redirected = true;
      window.location.replace('index_3.html');
    }
  }
});

// Login submit
loginForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearAlert();
  const email = $('#email').value.trim();
  const password = $('#password').value;
  if(!email || !password){ showAlert('أكمل جميع الحقول','error'); return; }
  setLoading($('#loginBtn'), $('#loginText'), $('#loginSpin'), true, 'تسجيل الدخول');
  try{
    const cred = await signInWithEmailAndPassword(auth, email, password);
    // تحقق من الدور
    const snap = await getDoc(doc(db,'users',cred.user.uid));
    const role = snap.exists() ? (snap.data().role||'user') : 'user';
    if(role !== 'user'){
      await signOut(auth);
      showAlert('هذا الحساب ليس حساب مستخدم','error');
      setLoading($('#loginBtn'), $('#loginText'), $('#loginSpin'), false, 'تسجيل الدخول');
      return;
    }
    showAlert('تم تسجيل الدخول، جاري التحويل...','success');
    redirected = true;
    setTimeout(()=>{ window.location.replace('index_3.html'); }, 400);
  }catch(err){
    showAlert(mapErr(err),'error');
    setLoading($('#loginBtn'), $('#loginText'), $('#loginSpin'), false, 'تسجيل الدخول');
  }
});

// Signup submit
signupForm.addEventListener('submit', async (e)=>{
  e.preventDefault();
  clearAlert();
  const name = $('#sName').value.trim();
  const email = $('#sEmail').value.trim();
  const password = $('#sPassword').value;
  if(!name || !email || password.length < 6){ showAlert('أكمل البيانات بشكل صحيح','error'); return; }
  setLoading($('#signupBtn'), $('#signupText'), $('#signupSpin'), true, 'إنشاء الحساب');
  try{
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db,'users',cred.user.uid), {
      uid: cred.user.uid, name, email, role: 'user', createdAt: Date.now()
    });
    showAlert('تم إنشاء الحساب بنجاح، جاري التحويل...','success');
    redirected = true;
    setTimeout(()=>{ window.location.replace('index_3.html'); }, 500);
  }catch(err){
    showAlert(mapErr(err),'error');
    setLoading($('#signupBtn'), $('#signupText'), $('#signupSpin'), false, 'إنشاء الحساب');
  }
});

// Forgot password
$('#forgot').addEventListener('click', async ()=>{
  clearAlert();
  const email = $('#email').value.trim();
  if(!email){ showAlert('اكتب بريدك في الحقل أولاً','error'); return; }
  try{
    await sendPasswordResetEmail(auth, email);
    showAlert('تم إرسال رابط استعادة كلمة المرور إلى بريدك','success');
  }catch(err){ showAlert(mapErr(err),'error'); }
});

// Service Worker registration (same approach as other pages)
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').then(reg=>{
    setInterval(()=>reg.update(), 60000);
  }).catch(()=>{});
}
</script>
</body>
</html>
