<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>طابك - المندوب </title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <meta name="google-site-verification" content="DhT6dcetl6v_uKdz_S_asi6u918VSW4SRqR8GGCcKgw" />
<style>
:root{
  --primary:#0EA5E9; --primary-dark:#0284C7; --primary-light:#E0F2FE;
  --accent:#FF5A1F; --dark:#0F172A; --gray:#64748B; --light:#F1F5F9; --border:#E2E8F0;
  --success:#22C55E; --warning:#F59E0B; --danger:#EF4444;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:'Cairo',sans-serif}
html,body{height:100%;overflow:hidden}
body{background:var(--light);color:var(--dark);font-size:15px}
.app{max-width:480px;margin:0 auto;height:100vh;background:white;position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.08)}
.screen{position:absolute;inset:0;overflow-y:auto;overflow-x:hidden;display:none;padding-bottom:80px}
.screen.active{display:block;animation:fadeIn .3s}
.auth-screen.active{display:flex;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.auth-screen{background:linear-gradient(160deg,#0EA5E9 0%,#38BDF8 50%,#7DD3FC 100%);padding:40px 24px;flex-direction:column;justify-content:center;min-height:100vh}
.auth-logo{width:120px;height:120px;margin:0 auto 20px;border-radius:30px;background:white;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 40px rgba(0,0,0,.2);overflow:hidden}
.auth-logo img{width:100%;height:100%;object-fit:cover}
.auth-logo i{font-size:60px;color:var(--primary)}
.auth-title{text-align:center;color:white;font-size:28px;font-weight:900;margin-bottom:8px}
.auth-sub{text-align:center;color:rgba(255,255,255,.9);margin-bottom:32px;font-size:14px}
.auth-card{background:white;border-radius:24px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.tabs{display:flex;background:var(--light);border-radius:14px;padding:4px;margin-bottom:20px}
.tab{flex:1;padding:10px;text-align:center;border-radius:10px;font-weight:600;color:var(--gray);cursor:pointer;font-size:14px}
.tab.active{background:white;color:var(--primary);box-shadow:0 2px 8px rgba(0,0,0,.08)}
.field{margin-bottom:14px}
.field label{display:block;font-size:13px;color:var(--gray);margin-bottom:6px;font-weight:600}
.input-wrap{position:relative}
.input-wrap i{position:absolute;right:14px;top:50%;transform:translateY(-50%);color:var(--gray)}
.input,.textarea{width:100%;padding:13px 40px 13px 14px;border:1.5px solid var(--border);border-radius:12px;font-size:14px;font-family:inherit;background:white}
.input:focus,.textarea:focus{outline:none;border-color:var(--primary);background:var(--primary-light)}
.textarea{min-height:70px;padding:13px 14px}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:.2s}
.btn-primary{background:var(--primary);color:white}
.btn-primary:hover{background:var(--primary-dark)}
.btn-success{background:var(--success);color:white}
.btn-danger{background:var(--danger);color:white}
.btn-outline{background:white;color:var(--primary);border:1.5px solid var(--primary)}
.btn:disabled{opacity:.6;cursor:not-allowed}
.err{background:#FEF2F2;color:var(--danger);padding:10px;border-radius:10px;font-size:13px;margin-bottom:12px;display:none}
.err.show{display:block}

.header{background:white;padding:16px 20px;display:flex;align-items:center;gap:14px;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50}
.header h2{font-size:17px;font-weight:800;flex:1}
.icon-btn{width:40px;height:40px;border-radius:12px;background:var(--light);border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dark);font-size:16px}
.icon-btn:hover{background:var(--primary-light);color:var(--primary)}

.home-hero{background:linear-gradient(135deg,var(--primary),#38BDF8);padding:20px;color:white;border-bottom-left-radius:28px;border-bottom-right-radius:28px;margin-bottom:16px}
.home-hero .greet{font-size:13px;opacity:.9}
.home-hero .name{font-size:20px;font-weight:800;margin-bottom:14px}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat{background:rgba(255,255,255,.18);backdrop-filter:blur(8px);padding:12px;border-radius:14px;text-align:center}
.stat .v{font-size:20px;font-weight:800}
.stat .l{font-size:11px;opacity:.85;margin-top:3px}

.section{padding:0 20px;margin-bottom:16px}
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.section-head h3{font-size:16px;font-weight:800}

.tabs-pills{display:flex;gap:8px;padding:0 20px;margin-bottom:12px;overflow-x:auto;scrollbar-width:none}
.tabs-pills::-webkit-scrollbar{display:none}
.pill{padding:8px 16px;background:white;border:1.5px solid var(--border);border-radius:100px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;color:var(--dark)}
.pill.active{background:var(--primary);color:white;border-color:var(--primary)}

.order-card{background:white;padding:14px;border-radius:14px;margin-bottom:10px;border:1px solid var(--border);cursor:pointer;transition:.2s}
.order-card:hover{box-shadow:0 6px 16px rgba(0,0,0,.06)}
.order-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.order-head h5{font-size:14px;font-weight:700;display:flex;align-items:center;gap:6px}
.badge{padding:4px 10px;border-radius:100px;font-size:11px;font-weight:700}
.badge.pending{background:#FEF3C7;color:#92400E}
.badge.accepted{background:#DBEAFE;color:#1E40AF}
.badge.on_way{background:#E0E7FF;color:#4338CA}
.badge.delivered{background:#D1FAE5;color:#065F46}
.badge.cancelled{background:#FEE2E2;color:#991B1B}
.order-card .row{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--gray);margin-bottom:4px}
.order-card .total{margin-top:8px;padding-top:8px;border-top:1px dashed var(--border);display:flex;justify-content:space-between;font-weight:700;font-size:14px}
.order-card .total .val{color:var(--primary)}

#map,#orderMap{height:260px;width:100%;border-radius:16px;margin-bottom:12px;z-index:1}
.map-note{background:var(--primary-light);color:var(--primary-dark);padding:10px 14px;border-radius:12px;font-size:12px;margin-bottom:12px;display:flex;gap:8px;align-items:center}

.total-card{background:white;padding:16px;border-radius:16px;margin-bottom:10px;border:1px solid var(--border)}
.total-card h4{font-size:14px;margin-bottom:8px}
.total-row{display:flex;justify-content:space-between;margin-bottom:6px;font-size:13px}
.total-row.big{font-size:16px;font-weight:800;border-top:1px dashed var(--border);padding-top:8px;margin-top:8px}

.chat-container{display:flex;flex-direction:column;height:calc(100vh - 60px)}
.chat-messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:10px;background:var(--light)}
.msg{max-width:75%;padding:10px 14px;border-radius:16px;font-size:14px;line-height:1.5;word-wrap:break-word}
.msg.me{align-self:flex-start;background:var(--primary);color:white;border-bottom-right-radius:4px}
.msg.other{align-self:flex-end;background:white;border:1px solid var(--border);border-bottom-left-radius:4px}
.msg-time{font-size:10px;opacity:.7;margin-top:3px}
.chat-input{background:white;padding:12px;display:flex;gap:8px;border-top:1px solid var(--border)}
.chat-input input{flex:1;padding:11px 14px;border:1px solid var(--border);border-radius:100px;font-size:14px;font-family:inherit;outline:none}
.chat-input button{width:44px;height:44px;border-radius:50%;background:var(--primary);color:white;border:none;cursor:pointer}

.bottom-nav{position:absolute;bottom:0;left:0;right:0;background:white;border-top:1px solid var(--border);display:flex;padding:8px 0;z-index:40;max-width:480px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px;cursor:pointer;color:var(--gray);font-size:11px;font-weight:600}
.nav-item i{font-size:18px}
.nav-item.active{color:var(--primary)}

.empty{text-align:center;padding:50px 20px;color:var(--gray)}
.empty i{font-size:52px;color:var(--border);margin-bottom:12px}
.empty h4{font-size:16px;font-weight:700;color:var(--dark);margin-bottom:5px}

.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--dark);color:white;padding:12px 22px;border-radius:100px;font-size:13px;z-index:200;opacity:0;transition:.3s;max-width:90%}
.toast.show{opacity:1;top:30px}
.toast.success{background:var(--success)}
.toast.error{background:var(--danger)}

.profile-head{text-align:center;padding:28px 20px 20px;background:linear-gradient(135deg,var(--primary),#38BDF8);color:white;border-bottom-left-radius:28px;border-bottom-right-radius:28px;margin-bottom:16px}
.avatar-big{width:80px;height:80px;margin:0 auto 12px;border-radius:50%;background:white;color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:700}
.menu-item{background:white;padding:14px 16px;border-radius:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;border:1px solid var(--border)}
.menu-item .ic{width:38px;height:38px;border-radius:10px;background:var(--primary-light);color:var(--primary);display:flex;align-items:center;justify-content:center;font-size:15px}
.menu-item span{flex:1;font-weight:600;font-size:14px}

.switch-row{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:white;border-radius:12px;margin-bottom:8px;border:1px solid var(--border)}
.switch-row .info{display:flex;align-items:center;gap:10px;font-weight:600;font-size:14px}
.switch{position:relative;width:50px;height:28px;background:var(--border);border-radius:100px;cursor:pointer;transition:.2s}
.switch.on{background:var(--success)}
.switch::after{content:'';position:absolute;top:3px;right:3px;width:22px;height:22px;border-radius:50%;background:white;transition:.2s}
.switch.on::after{right:25px}
</style>
</head>
<body>
<div class="app" id="app">

<div id="authScreen" class="screen active auth-screen">
  <div class="auth-logo" id="authLogo"><i class="fas fa-motorcycle"></i></div>
  <h1 class="auth-title">بوابة المندوب</h1>
  <p class="auth-sub">استلم الطلبات واكسب مع كل توصيل</p>
  <div class="auth-card">
    <div class="tabs">
      <div class="tab active" data-tab="login">دخول</div>
      <div class="tab" data-tab="register">حساب جديد</div>
    </div>
    <div class="err" id="authErr"></div>
    <div id="loginForm">
      <div class="field"><label>البريد الإلكتروني</label><div class="input-wrap"><i class="far fa-envelope"></i><input id="loginEmail" class="input" type="email"></div></div>
      <div class="field"><label>كلمة المرور</label><div class="input-wrap"><i class="fas fa-lock"></i><input id="loginPass" class="input" type="password"></div></div>
      <button class="btn btn-primary" id="loginBtn"><i class="fas fa-right-to-bracket"></i> دخول</button>
    </div>
    <div id="registerForm" style="display:none">
      <div class="field"><label>الاسم الكامل</label><div class="input-wrap"><i class="far fa-user"></i><input id="regName" class="input"></div></div>
      <div class="field"><label>رقم الجوال</label><div class="input-wrap"><i class="fas fa-phone"></i><input id="regPhone" class="input"></div></div>
      <div class="field"><label>نوع المركبة</label><div class="input-wrap"><i class="fas fa-motorcycle"></i><input id="regVehicle" class="input" placeholder="دراجة / سيارة"></div></div>
      <div class="field"><label>البريد الإلكتروني</label><div class="input-wrap"><i class="far fa-envelope"></i><input id="regEmail" class="input" type="email"></div></div>
      <div class="field"><label>كلمة المرور</label><div class="input-wrap"><i class="fas fa-lock"></i><input id="regPass" class="input" type="password"></div></div>
      <button class="btn btn-primary" id="regBtn"><i class="fas fa-user-plus"></i> إنشاء حساب مندوب</button>
    </div>
  </div>
</div>

<div id="homeScreen" class="screen">
  <div class="home-hero">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
      <div><div class="greet">مرحباً</div><div class="name" id="helloName">المندوب</div></div>
      <div style="text-align:left"><span style="font-size:11px;opacity:.85">الحالة</span><div id="statusLabel" style="font-weight:700">غير متاح</div></div>
    </div>
    <div class="stats">
      <div class="stat"><div class="v" id="sTotal">0</div><div class="l">إجمالي</div></div>
      <div class="stat"><div class="v" id="sDone">0</div><div class="l">مكتمل</div></div>
      <div class="stat"><div class="v" id="sActive">0</div><div class="l">نشط</div></div>
    </div>
  </div>

  <div class="section">
    <div class="switch-row">
      <div class="info"><i class="fas fa-circle-dot" id="availIcon" style="color:var(--gray)"></i> متاح لاستلام الطلبات</div>
      <div class="switch" id="availSwitch"></div>
    </div>
  </div>

  <div class="tabs-pills" id="tabsPills">
    <div class="pill active" data-filter="available">متاحة</div>
    <div class="pill" data-filter="mine_active">طلباتي النشطة</div>
    <div class="pill" data-filter="mine_done">المكتملة</div>
  </div>

  <div class="section">
    <div id="ordersList"></div>
  </div>
</div>

<div id="orderScreen" class="screen">
  <div class="header">
    <button class="icon-btn" onclick="showScreen('homeScreen')"><i class="fas fa-chevron-right"></i></button>
    <h2>تفاصيل الطلب</h2>
    <button class="icon-btn" id="chatBtn"><i class="fas fa-comments"></i></button>
  </div>
  <div style="padding:16px" id="orderBody"></div>
</div>

<div id="chatScreen" class="screen">
  <div class="header">
    <button class="icon-btn" onclick="showScreen('orderScreen')"><i class="fas fa-chevron-right"></i></button>
    <h2>دردشة مع العميل</h2>
  </div>
  <div class="chat-container">
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input id="chatInput" placeholder="اكتب رسالة..." onkeypress="if(event.key==='Enter')sendMsg()">
      <button onclick="sendMsg()"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>
</div>

<div id="profileScreen" class="screen">
  <div class="profile-head">
    <div class="avatar-big" id="profAvatar">-</div>
    <h3 id="profName" style="font-size:18px;font-weight:800">-</h3>
    <p id="profEmail" style="font-size:13px;opacity:.9">-</p>
    <p id="profVehicle" style="font-size:12px;opacity:.85;margin-top:4px"></p>
  </div>
  <div style="padding:0 16px">
    <div class="menu-item"><div class="ic"><i class="fas fa-chart-line"></i></div><span>الأرباح</span></div>
    <div class="menu-item"><div class="ic"><i class="fas fa-star"></i></div><span>التقييمات</span></div>
    <div class="menu-item"><div class="ic"><i class="fas fa-headset"></i></div><span>الدعم</span></div>
    <div class="menu-item" onclick="logout()" style="color:var(--danger)">
      <div class="ic" style="background:#FEE2E2;color:var(--danger)"><i class="fas fa-right-from-bracket"></i></div>
      <span>تسجيل الخروج</span>
    </div>
  </div>
</div>

<div class="bottom-nav" id="bottomNav" style="display:none">
  <div class="nav-item active" data-nav="homeScreen"><i class="fas fa-house"></i><span>الرئيسية</span></div>
  <div class="nav-item" data-nav="profileScreen"><i class="far fa-user"></i><span>حسابي</span></div>
</div>

</div>
<div class="toast" id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, addDoc, serverTimestamp, orderBy, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA3wjOh1IZLS5cK8dH0fB6nwKH50iXvFhk",
  authDomain: "ahmad-b755f.firebaseapp.com",
  projectId: "ahmad-b755f",
  storageBucket: "ahmad-b755f.firebasestorage.app",
  messagingSenderId: "1086597289816",
  appId: "1:1086597289816:web:efe60451f04837b75e772d",
  measurementId: "G-E41VP56DLZ"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
await setPersistence(auth, browserLocalPersistence);

let currentUser=null, userData=null, currentOrder=null, allOrders=[], currentFilter='available', ordersUnsub=null, chatUnsub=null, orderUnsub=null;

const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

window.toast = (m,t='') => { const e=$('#toast'); e.textContent=m; e.className='toast show '+t; setTimeout(()=>e.classList.remove('show'),2500); };
window.showScreen = (id) => {
  $$('.screen').forEach(s=>s.classList.remove('active'));
  $('#'+id).classList.add('active');
  $$('.nav-item').forEach(n=>n.classList.toggle('active', n.dataset.nav===id));
};
$$('.nav-item').forEach(n=>n.addEventListener('click',()=>showScreen(n.dataset.nav)));
$$('.tab').forEach(t=>t.addEventListener('click',()=>{
  $$('.tab').forEach(x=>x.classList.remove('active')); t.classList.add('active');
  $('#loginForm').style.display = t.dataset.tab==='login'?'block':'none';
  $('#registerForm').style.display = t.dataset.tab==='register'?'block':'none';
  $('#authErr').classList.remove('show');
}));

function showErr(m){const e=$('#authErr');e.textContent=m;e.classList.add('show')}
function mapErr(e){
  const c=e.code||'';
  if(c.includes('email-already'))return 'البريد مسجل';
  if(c.includes('invalid-email'))return 'بريد غير صالح';
  if(c.includes('weak-password'))return 'كلمة مرور ضعيفة';
  if(c.includes('wrong-password')||c.includes('invalid-credential')||c.includes('user-not-found'))return 'بيانات غير صحيحة';
  return e.message||'خطأ';
}

$('#loginBtn').addEventListener('click', async ()=>{
  const email=$('#loginEmail').value.trim(), pass=$('#loginPass').value;
  if(!email||!pass)return showErr('أدخل البيانات');
  $('#loginBtn').disabled=true;
  try{await signInWithEmailAndPassword(auth,email,pass)}catch(e){showErr(mapErr(e))}
  $('#loginBtn').disabled=false;
});

$('#regBtn').addEventListener('click', async ()=>{
  const name=$('#regName').value.trim(), phone=$('#regPhone').value.trim(), vehicle=$('#regVehicle').value.trim(), email=$('#regEmail').value.trim(), pass=$('#regPass').value;
  if(!name||!phone||!email||!pass) return showErr('الحقول مطلوبة');
  if(pass.length<6) return showErr('كلمة المرور 6 أحرف');
  $('#regBtn').disabled=true;
  try{
    const cred=await createUserWithEmailAndPassword(auth,email,pass);
    await setDoc(doc(db,'users',cred.user.uid),{uid:cred.user.uid,name,phone,vehicle,email,role:'delivery',available:false,createdAt:serverTimestamp()});
  }catch(e){showErr(mapErr(e))}
  $('#regBtn').disabled=false;
});

window.logout = async () => { try{await signOut(auth)}catch(e){} };

onAuthStateChanged(auth, async (user)=>{
  if(user){
    currentUser=user;
    const snap=await getDoc(doc(db,'users',user.uid));
    if(snap.exists()) userData=snap.data();
    else { await signOut(auth); return; }
    if(userData.role!=='delivery'){ toast('هذا ليس حساب مندوب','error'); await signOut(auth); return; }
    initApp();
  } else {
    currentUser=null; userData=null;
    $('#bottomNav').style.display='none';
    showScreen('authScreen');
  }
});

function initApp(){
  $('#helloName').textContent = userData.name;
  $('#profAvatar').textContent = (userData.name||'?').charAt(0);
  $('#profName').textContent = userData.name;
  $('#profEmail').textContent = userData.email;
  $('#profVehicle').textContent = userData.vehicle ? `مركبة: ${userData.vehicle}` : '';
  $('#bottomNav').style.display='flex';
  showScreen('homeScreen');
  updateSwitch();
  subscribeOrders();
}

function updateSwitch(){
  const on = !!userData.available;
  $('#availSwitch').classList.toggle('on', on);
  $('#availIcon').style.color = on?'var(--success)':'var(--gray)';
  $('#statusLabel').textContent = on?'متاح':'غير متاح';
}

$('#availSwitch').addEventListener('click', async ()=>{
  userData.available = !userData.available;
  updateSwitch();
  try{ await updateDoc(doc(db,'users',currentUser.uid),{available:userData.available}); }
  catch(e){toast('خطأ','error')}
});

$$('#tabsPills .pill').forEach(p=>p.addEventListener('click',()=>{
  $$('#tabsPills .pill').forEach(x=>x.classList.remove('active'));
  p.classList.add('active');
  currentFilter = p.dataset.filter;
  renderOrders();
}));

function subscribeOrders(){
  if(ordersUnsub) ordersUnsub();
  ordersUnsub = onSnapshot(collection(db,'orders'),(snap)=>{
    allOrders = snap.docs.map(d=>({id:d.id,...d.data()}));
    const mine = allOrders.filter(o=>o.deliveryId===currentUser.uid);
    $('#sTotal').textContent = mine.length;
    $('#sDone').textContent = mine.filter(o=>o.status==='delivered').length;
    $('#sActive').textContent = mine.filter(o=>['accepted','on_way'].includes(o.status)).length;
    renderOrders();
  });
}

function statusLabel(s){ return {pending:'قيد الانتظار',accepted:'تم القبول',on_way:'في الطريق',delivered:'تم التسليم',cancelled:'ملغي'}[s]||s; }

function renderOrders(){
  let list = [];
  if(currentFilter==='available') list = allOrders.filter(o=>o.status==='pending'&&!o.deliveryId);
  if(currentFilter==='mine_active') list = allOrders.filter(o=>o.deliveryId===currentUser.uid && ['accepted','on_way'].includes(o.status));
  if(currentFilter==='mine_done') list = allOrders.filter(o=>o.deliveryId===currentUser.uid && ['delivered','cancelled'].includes(o.status));
  list.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  if(!list.length){ $('#ordersList').innerHTML = `<div class="empty"><i class="fas fa-inbox"></i><h4>لا توجد طلبات</h4></div>`; return; }
  $('#ordersList').innerHTML = list.map(o=>`
    <div class="order-card" data-id="${o.id}">
      <div class="order-head"><h5><i class="fas fa-store" style="color:var(--primary)"></i> ${esc(o.storeName||'طلب')}</h5><span class="badge ${o.status}">${statusLabel(o.status)}</span></div>
      <div class="row"><i class="fas fa-user" style="width:14px"></i> ${esc(o.userName||'عميل')}</div>
      <div class="row"><i class="fas fa-phone" style="width:14px"></i> ${esc(o.userPhone||'غير محدد')}</div>
      ${o.type==='custom'?`<div class="row"><i class="fas fa-wand-magic-sparkles" style="width:14px"></i> طلب مخصص</div>`:`<div class="row"><i class="fas fa-box" style="width:14px"></i> ${(o.items||[]).length} أصناف</div>`}
      <div class="total"><span>الإجمالي</span><span class="val">${o.total||0} ر.س</span></div>
    </div>`).join('');
  $$('#ordersList .order-card').forEach(c=>c.addEventListener('click',()=>openOrder(c.dataset.id)));
}

function openOrder(id){
  if(orderUnsub) orderUnsub();
  orderUnsub = onSnapshot(doc(db,'orders',id),(snap)=>{
    if(!snap.exists()) return;
    currentOrder = {id:snap.id,...snap.data()};
    renderOrderDetail();
  });
  showScreen('orderScreen');
}

function renderOrderDetail(){
  const o = currentOrder;
  const itemsHtml = (o.items||[]).map(i=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:13px"><span>${esc(i.name)} × ${i.qty}</span><strong>${i.price*i.qty} ر.س</strong></div>`).join('');
  let actionBtn = '';
  if(o.status==='pending' && !o.deliveryId) actionBtn = `<button class="btn btn-success" id="acceptBtn"><i class="fas fa-check"></i> قبول الطلب</button>`;
  else if(o.status==='accepted' && o.deliveryId===currentUser.uid) actionBtn = `<button class="btn btn-primary" id="onwayBtn"><i class="fas fa-motorcycle"></i> بدأت التوصيل</button>`;
  else if(o.status==='on_way' && o.deliveryId===currentUser.uid) actionBtn = `<button class="btn btn-success" id="deliveredBtn"><i class="fas fa-circle-check"></i> تم التسليم</button>`;

  $('#orderBody').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <h3 style="font-size:17px;font-weight:800"><i class="fas fa-store" style="color:var(--primary)"></i> ${esc(o.storeName||'طلب')}</h3>
      <span class="badge ${o.status}">${statusLabel(o.status)}</span>
    </div>
    <div class="total-card">
      <h4><i class="fas fa-user"></i> معلومات العميل</h4>
      <div class="total-row"><span>الاسم</span><strong>${esc(o.userName||'-')}</strong></div>
      <div class="total-row"><span>الهاتف</span><strong><a href="tel:${esc(o.userPhone||'')}" style="color:var(--primary)">${esc(o.userPhone||'-')}</a></strong></div>
    </div>
    ${o.type==='custom'?`<div class="total-card"><h4><i class="fas fa-wand-magic-sparkles"></i> طلب مخصص</h4><p style="font-size:13px;line-height:1.6">${esc(o.customRequest||'')}</p>${o.budget?`<p style="font-size:12px;color:var(--gray);margin-top:6px">الميزانية: ${o.budget} ر.س</p>`:''}</div>`:''}
    ${itemsHtml?`<div class="total-card"><h4><i class="fas fa-box"></i> الأصناف</h4>${itemsHtml}</div>`:''}
    <div class="total-card">
      <div class="total-row"><span>المجموع</span><strong>${o.subtotal||0} ر.س</strong></div>
      <div class="total-row"><span>التوصيل</span><strong>${o.deliveryFee||0} ر.س</strong></div>
      <div class="total-row big"><span>الإجمالي</span><strong style="color:var(--primary)">${o.total||0} ر.س</strong></div>
    </div>
    ${o.address?`<div class="total-card"><h4><i class="fas fa-location-dot"></i> العنوان</h4><p style="font-size:13px">${esc(o.address)}</p></div>`:''}
    ${o.note?`<div class="total-card"><h4><i class="fas fa-note-sticky"></i> ملاحظات</h4><p style="font-size:13px">${esc(o.note)}</p></div>`:''}
    <div id="orderMap"></div>
    ${actionBtn}
  `;

  setTimeout(()=>{
    const m = L.map('orderMap').setView([o.location.lat,o.location.lng],15);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM'}).addTo(m);
    L.marker([o.location.lat,o.location.lng]).addTo(m);
  },200);

  const aBtn=$('#acceptBtn'); if(aBtn) aBtn.addEventListener('click',async ()=>{
    aBtn.disabled=true;
    try{await updateDoc(doc(db,'orders',o.id),{status:'accepted',deliveryId:currentUser.uid,deliveryName:userData.name,deliveryPhone:userData.phone||''});toast('تم قبول الطلب','success');}
    catch(e){toast('خطأ','error')}
  });
  const owBtn=$('#onwayBtn'); if(owBtn) owBtn.addEventListener('click',async ()=>{
    owBtn.disabled=true;
    try{await updateDoc(doc(db,'orders',o.id),{status:'on_way'});toast('في الطريق','success');}
    catch(e){toast('خطأ','error')}
  });
  const dBtn=$('#deliveredBtn'); if(dBtn) dBtn.addEventListener('click',async ()=>{
    dBtn.disabled=true;
    try{await updateDoc(doc(db,'orders',o.id),{status:'delivered'});toast('تم التسليم','success');}
    catch(e){toast('خطأ','error')}
  });
}

$('#chatBtn').addEventListener('click', ()=>{
  if(!currentOrder) return;
  if(chatUnsub) chatUnsub();
  $('#chatMessages').innerHTML='';
  const q = query(collection(db,'chats',currentOrder.id,'messages'), orderBy('timestamp','asc'));
  chatUnsub = onSnapshot(q,(snap)=>{
    $('#chatMessages').innerHTML = snap.docs.map(d=>{
      const m=d.data();
      const mine = m.from===currentUser.uid;
      return `<div class="msg ${mine?'me':'other'}">${esc(m.text)}<div class="msg-time">${m.fromName||''}</div></div>`;
    }).join('');
    $('#chatMessages').scrollTop = $('#chatMessages').scrollHeight;
  });
  showScreen('chatScreen');
});

window.sendMsg = async ()=>{
  const t = $('#chatInput').value.trim(); if(!t||!currentOrder) return;
  $('#chatInput').value='';
  try{await addDoc(collection(db,'chats',currentOrder.id,'messages'),{from:currentUser.uid,fromName:userData.name,text:t,timestamp:serverTimestamp()})}
  catch(e){toast('خطأ','error')}
};

function esc(s){return String(s||'').replace(/[<>&"']/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</body>
